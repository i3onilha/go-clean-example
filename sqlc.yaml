version: "2"
sql:
  - engine: "mysql"
    queries: "internal/repository/mysql/user/user.sql"
    schema: "internal/repository/mysql/schema.sql"
    gen:
      go:
        package: "user"
        out: "internal/repository/mysql/user"
        emit_json_tags: true
        overrides:
          - db_type: "decimal"
            go_type:
              import: "github.com/shopspring/decimal"
              type: "Decimal"
